server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/stockbench
    username: stockbench
    password: stockbench
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
        show_sql: false
        # ??? ? ?? ? lock timeout (ms)
        javax.persistence.lock.timeout: 3000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: stock-bench
