services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stockbench
      POSTGRES_USER: stockbench
      POSTGRES_PASSWORD: stockbench
    ports:
      - "15434:5432"
    command: [ "postgres", "-c", "max_connections=200" ]
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      logging.level.nuts.commerce.stocklockbenchmark.service.TestRunnerService: DEBUG
    ports:
      - "18081:8080"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "19090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "13000:3000"
    depends_on:
      - prometheus
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
