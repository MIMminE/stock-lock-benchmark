services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stockbench
      POSTGRES_USER: stockbench
      POSTGRES_PASSWORD: stockbench
    ports:
      - "15434:5432"
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - stockbench-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockbench -d stockbench"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      logging.level.nuts.commerce.stocklockbenchmark.service.TestRunnerService: DEBUG
    ports:
      - "18081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "19090:9090"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "13000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  stockbench-pgdata:
