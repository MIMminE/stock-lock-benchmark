name: Smoke Runtime

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Verify supported branch
        run: |
          case "${GITHUB_REF_NAME}" in
            main|dev) ;;
            *) echo "Smoke runtime is intended for main/dev branches."; exit 1 ;;
          esac

      - uses: actions/checkout@v4

      - name: Run Docker Compose smoke test
        run: bash scripts/smoke-runtime.sh
