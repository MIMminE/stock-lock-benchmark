<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Stock lock benchmark summary</title>
  <desc id="desc">Throughput and retry comparison for optimistic and pessimistic locking.</desc>
  <rect width="920" height="420" fill="#ffffff"/>
  <text x="36" y="46" fill="#17202a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Concurrency 50 결과 요약</text>
  <text x="36" y="78" fill="#657184" font-family="Arial, sans-serif" font-size="14">단일 row 재고 차감 핫스팟에서 비관락은 재시도 없이 더 안정적인 처리량을 보였다.</text>

  <text x="70" y="132" fill="#17202a" font-family="Arial, sans-serif" font-size="16" font-weight="700">Throughput(success/s)</text>
  <rect x="70" y="154" width="180" height="34" rx="5" fill="#b45309"/>
  <rect x="70" y="210" width="526" height="34" rx="5" fill="#116b5f"/>
  <text x="262" y="177" fill="#17202a" font-family="Arial, sans-serif" font-size="15">Optimistic 135.7/s</text>
  <text x="608" y="233" fill="#17202a" font-family="Arial, sans-serif" font-size="15">Pessimistic 396.4/s</text>

  <text x="70" y="306" fill="#17202a" font-family="Arial, sans-serif" font-size="16" font-weight="700">Retry cost</text>
  <rect x="70" y="328" width="560" height="34" rx="5" fill="#b45309"/>
  <rect x="70" y="374" width="4" height="26" rx="2" fill="#116b5f"/>
  <text x="646" y="351" fill="#17202a" font-family="Arial, sans-serif" font-size="15">Optimistic 187,185 retries</text>
  <text x="90" y="394" fill="#17202a" font-family="Arial, sans-serif" font-size="15">Pessimistic 0</text>

  <rect x="690" y="126" width="180" height="112" rx="8" fill="#eef7f5" stroke="#cfe5df"/>
  <text x="714" y="164" fill="#116b5f" font-family="Arial, sans-serif" font-size="32" font-weight="700">2.92x</text>
  <text x="714" y="194" fill="#17202a" font-family="Arial, sans-serif" font-size="15">처리량 우위</text>

  <rect x="690" y="268" width="180" height="112" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="714" y="306" fill="#b45309" font-family="Arial, sans-serif" font-size="32" font-weight="700">2.88x</text>
  <text x="714" y="336" fill="#17202a" font-family="Arial, sans-serif" font-size="15">p99 latency 개선</text>
</svg>
